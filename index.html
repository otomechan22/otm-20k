<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Otome Special GIFT</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background">

  <div id="complete">

<div class="container">

<header>

<h1>Otome Special GIFT</h1>

<p class="sub">
20K達成記念🎀
</p>

</header>

<section class="message">

<p>

皆さまのおかげで<br>

20Kを達成することができました✨

</p>

<p>

いつも応援してくださり
本当にありがとうございます♡

</p>

<p>

感謝の気持ちを込めて

アクリルスタンドを
プレゼントさせていただきます🎁

</p>

</section>

<section class="image-area">

<img
src="images/acrylicstand.png"
alt="アクリルスタンド">

</section>

<form id="giftForm">

<div class="card">

<label>

お名前

</label>

<input
type="text"
name="name"
required>

</div>

<div class="card">

<label>

20K達成記念
アクリルスタンドを受け取りますか？

</label>

<div class="radio-group">

<label>

<input
type="radio"
name="receive"
value="受け取る"
required>

受け取る♡

</label>

<label>

<input
type="radio"
name="receive"
value="辞退する">

今回は辞退します

</label>

</div>

</div>

<div
class="card hidden"
id="shippingCard">

<label>

匿名配送になります。

送料のみ
ご負担いただいても
よろしいですか？

</label>

<div class="radio-group">

<label>

<input
type="radio"
name="shipping"
value="了承しました">

了承しました♡

</label>

<label>

<input
type="radio"
name="shipping"
value="今回は辞退">

辞退します

</label>

</div>

</div>

<div
class="card hidden"
id="memberCard">

<label>

2025年から継続して
メンシプに
入ってくださっている方へ♡

</label>

<p>

感謝の気持ちとして

同じアクリルスタンドを

もう1体プレゼントします🎁

</p>

<p>

20K達成者の方は
合計2体になります♡

</p>

<div class="radio-group">

<label>

<input
type="radio"
name="bonus"
value="2体受け取る">

2体受け取ります♡

</label>

<label>

<input
type="radio"
name="bonus"
value="1体のみ">

1体のみ受け取ります

</label>

</div>

</div>
<div class="card">

<label for="xid">

X（旧Twitter）のユーザー名
（DMでご連絡します）

</label>

<input
type="text"
id="xid"
name="xid"
placeholder="@otomechan">

</div>

<div class="card">

<label>

DMを受け取れる状態になっていますか？

</label>

<div class="radio-group">

<label>
<input
type="radio"
name="dm"
value="はい"
required>

はい♡

</label>

<label>

<input
type="radio"
name="dm"
value="いいえ">

まだ設定していません

</label>

</div>

</div>

<div class="card">

<label>

その他・メッセージ
（任意）

</label>

<textarea
name="message"
rows="5"
placeholder="メッセージがあればご自由にご記入ください♡"></textarea>

</div>

<div class="submit-area">

<button
type="submit"
id="submitButton">

回答する♡

</button>

</div>

</form>

</div>

</div>

<!-- ローディング -->

<div
id="loading"
class="loading">

<div class="loader"></div>

<p>

送信しています♡

</p>

</div>

<!-- 完了画面 -->

<div
id="complete"
class="complete">

<div class="complete-box">

<h2>

ありがとうございます♡

</h2>

<p>

回答を受け付けました✨

</p>

<p>

発送まで
もう少しお待ちください🎀

</p>

</div>

</div>

<!-- ハート演出 -->

<div
id="heartBurst"
class="heart-burst">

❤

</div>

<script src="script.js"></script>

</body>
</html>
